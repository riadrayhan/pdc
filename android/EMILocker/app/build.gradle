plugins {
    id 'com.android.application'
    id 'com.google.gms.google-services'
}

android {
    namespace 'com.riad.rrlkr'
    compileSdk 35

    defaultConfig {
        applicationId "com.riad.rrlkr"
        minSdk 24
        targetSdk 35
        versionCode 10
        versionName "3.1.6"

        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"

        // Server URL - Live API
        buildConfigField "String", "SERVER_URL", "\"https://riadrayhan111-rr-locker-api.hf.space/api/v1\""

        // ==========================================================
        // FRP (Factory Reset Protection) Google Account
        // ==========================================================
        // After ANY factory reset (recovery mode, settings menu, ADB), the device
        // boots into FRP lock screen requiring THIS Google account to unlock.
        // Without this account credential, the phone is BRICKED forever.
        //
        // âš ï¸ IMPORTANT: Replace with YOUR company-controlled Google account.
        // Create a dedicated Google account at https://accounts.google.com
        // (e.g. emifrp.yourcompany@gmail.com) and store credentials securely.
        // NEVER use a personal account â€” if lost, all devices are unrecoverable.
        // ==========================================================
        buildConfigField "String", "DEFAULT_FRP_ACCOUNT", "\"x657595@gmail.com\""

        // CRITICAL: testOnly=false required for Device Owner provisioning
        // Samsung and Android 13+ reject testOnly APKs during QR provisioning
        addManifestPlaceholders([testOnly: "false"])
    }

    // CRITICAL: Disable testOnly flag for ALL build types
    // Without this, Samsung QR provisioning fails with "Contact your IT administrator"
    testOptions {
        unitTests.all {
            testOnly = false
        }
    }

    signingConfigs {
        debug {
            storeFile file(System.getProperty("user.home") + "/.android/debug.keystore")
            storePassword "android"
            keyAlias "androiddebugkey"
            keyPassword "android"
            v1SigningEnabled true
            v2SigningEnabled true
        }
        release {
            // Proper release keystore — credentials loaded from
            // android/EMILocker/keystore.properties (gitignored) or env vars.
            def ksPropsFile = rootProject.file("keystore.properties")
            def ksProps = new Properties()
            if (ksPropsFile.exists()) {
                ksProps.load(new FileInputStream(ksPropsFile))
            }
            storeFile rootProject.file(ksProps.getProperty("storeFile",
                    System.getenv("EMI_KEYSTORE_FILE") ?: "emifinance-release.jks"))
            storePassword ksProps.getProperty("storePassword",
                    System.getenv("EMI_KEYSTORE_PASSWORD") ?: "")
            keyAlias ksProps.getProperty("keyAlias",
                    System.getenv("EMI_KEY_ALIAS") ?: "emifinance")
            keyPassword ksProps.getProperty("keyPassword",
                    System.getenv("EMI_KEY_PASSWORD") ?: "")
            v1SigningEnabled true
            v2SigningEnabled true
            enableV3Signing true
            enableV4Signing true
        }
    }

    buildTypes {
        release {
            minifyEnabled true
            signingConfig signingConfigs.release
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
            buildConfigField "String", "SERVER_URL", "\"https://riadrayhan111-rr-locker-api.hf.space/api/v1\""
            // Samsung + Android 13+ fix: debug APKs are always blocked
            debuggable false
        }
        debug {
            minifyEnabled false
            signingConfig signingConfigs.debug
            // Debug also uses live API
            buildConfigField "String", "SERVER_URL", "\"https://riadrayhan111-rr-locker-api.hf.space/api/v1\""
            // CRITICAL: Use release signing for debug builds too
            // Debug-signed APKs are ALWAYS blocked by Play Protect on Android 13+
            // and Samsung rejects testOnly debug APKs during QR provisioning
            signingConfig signingConfigs.release
        }
    }
    
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }
    
    buildFeatures {
        viewBinding true
        buildConfig true
    }
}

dependencies {
    // AndroidX
    implementation 'androidx.appcompat:appcompat:1.7.0'
    implementation 'com.google.android.material:material:1.12.0'
    implementation 'androidx.constraintlayout:constraintlayout:2.2.0'
    implementation 'androidx.core:core-ktx:1.13.1'
    implementation 'androidx.work:work-runtime:2.9.1'
    
    // Firebase
    implementation platform('com.google.firebase:firebase-bom:33.5.1')
    implementation 'com.google.firebase:firebase-messaging'
    implementation 'com.google.firebase:firebase-analytics'
    
    // Networking
    implementation 'com.squareup.retrofit2:retrofit:2.9.0'
    implementation 'com.squareup.retrofit2:converter-gson:2.9.0'
    implementation 'com.squareup.okhttp3:okhttp:4.12.0'
    implementation 'com.squareup.okhttp3:logging-interceptor:4.12.0'
    
    // JSON
    implementation 'com.google.code.gson:gson:2.10.1'
    
    // Fused location (fast, reliable GPS fixes via Google Play Services)
    implementation 'com.google.android.gms:play-services-location:21.3.0'
    
    // SharedPreferences encryption
    implementation 'androidx.security:security-crypto:1.1.0-alpha06'
    
    // Testing
    testImplementation 'junit:junit:4.13.2'
    androidTestImplementation 'androidx.test.ext:junit:1.1.5'
    androidTestImplementation 'androidx.test.espresso:espresso-core:3.5.1'
}
