# Backend API is hosted on Hugging Face Spaces:
#   https://riadrayhan111-rr-locker-api.hf.space
# Only the React dashboard is deployed on Render.
services:
  # React dashboard (Vite static build)
  - type: web
    name: rr-locker-dashboard
    runtime: static
    rootDir: dashboard
    buildCommand: npm ci && npm run build
    staticPublishPath: ./dist
    pullRequestPreviewsEnabled: false
    envVars:
      - key: VITE_API_URL
        value: "https://riadrayhan111-rr-locker-api.hf.space/api/v1"
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
    routes:
      # SPA fallback so React Router handles client-side routing
      - type: rewrite
        source: /*
        destination: /index.html

