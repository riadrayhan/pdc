version: '3.8'

# Node.js + Socket.IO backend (migrated from FastAPI/Celery).
# Background jobs run in-process via node-cron, so Redis/Celery are no longer
# needed. The backend also serves the built dashboard SPA and the APK.

services:
  backend:
    build:
      context: ./backend-node
      dockerfile: Dockerfile
    container_name: rr_locker_api
    environment:
      - PORT=7860
      - TZ=UTC
      # Defaults to SQLite at /data/emi_locker.db. Set DATABASE_URL to a
      # postgres:// URL to use Postgres instead.
      - DATABASE_URL=${DATABASE_URL:-}
      - SECRET_KEY=${SECRET_KEY:-your-super-secret-key-change-in-production}
      - CORS_ORIGINS=${CORS_ORIGINS:-*}
      - APP_EXTERNAL_URL=${APP_EXTERNAL_URL:-}
    volumes:
      - api_data:/data
      - ./backend-node/service-account.json:/app/service-account.json:ro
    ports:
      - "7860:7860"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:7860/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - rr_network
    restart: unless-stopped

volumes:
  api_data:

networks:
  rr_network:
    driver: bridge
